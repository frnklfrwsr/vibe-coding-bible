name: Validate VCB Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install PyYAML jsonschema

      - name: Run repository validator
        run: python scripts/validate_repository.py
